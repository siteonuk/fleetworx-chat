name: Deploy Fleetworx AI Chat (Develop)

on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACCESS_TOKEN }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.multi
          target: api-build
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/siteonuk/fleetworx-chat:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Deploy to server via SSH
        run: |
          ssh -o StrictHostKeyChecking=no root@78.129.143.28 \
            "cd /var/www/fleetworx_ai/chat.fleetworx.net \
            && docker compose pull \
            && docker compose up -d"

      - name: Verify deployment
        run: |
          echo "Waiting for services to start..."
          sleep 30
          ssh -o StrictHostKeyChecking=no root@78.129.143.28 \
            "cd /var/www/fleetworx_ai/chat.fleetworx.net \
            && docker compose ps \
            && echo 'Checking health endpoint on port 3080...' \
            && curl -f http://localhost:3080/health || (echo 'Health check failed, checking port 8000 as fallback...' && curl -f http://localhost:8000/health)"
